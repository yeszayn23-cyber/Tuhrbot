<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق طُهر | Tuhr App</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #E6E6FA; --nude1: #D2B48C; --nude2: #BC8F8F; --nude3: #C19A6B; --nude4: #A0522D; --text: #4B0082; }
        body { background-color: var(--bg); font-family: 'Tajawal', sans-serif; margin: 0; padding: 20px; text-align: center; transition: 0.8s; min-height: 100vh; }
        
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; }
        .profile-btn { font-size: 24px; cursor: pointer; color: var(--text); background: rgba(255,255,255,0.3); padding: 10px; border-radius: 50%; }
        .logo { font-size: 2.5rem; font-weight: bold; color: var(--text); }
        
        .palette { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; max-width: 450px; margin: 50px auto; }
        .circle { width: 150px; height: 150px; border-radius: 50%; border: 6px solid #fff; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.1); transition: 0.4s; }
        .circle:hover { transform: scale(1.1) rotate(5deg); }
        
        #modal { display: none; position: fixed; inset: 0; background: rgba(255, 255, 255, 0.98); padding: 40px; overflow-y: auto; z-index: 1000; animation: slideUp 0.5s; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .admin-panel { display: none; color: red; font-size: 12px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="header">
    <div class="profile-btn" onclick="openProfile()">👤</div>
    <div class="logo">طُهر</div>
    <div class="admin-panel" id="adminBadge">مدير النظام (Admin)</div>
</div>

<div class="palette">
    <div class="circle" style="background: var(--nude1);" onclick="loadSection('dora')">حساب الدورة</div>
    <div class="circle" style="background: var(--nude2);" onclick="loadSection('nizam')">مخطط الدورة</div>
    <div class="circle" style="background: var(--nude3);" onclick="loadSection('tips')">نصائح طبية</div>
    <div class="circle" style="background: var(--nude4);" onclick="loadSection('fiqh')">الجانب الفقهي</div>
</div>

<div id="modal">
    <button onclick="document.getElementById('modal').style.display='none'" style="border:none; background:none; font-size:24px;">✕</button>
    <div id="modalContent"></div>
</div>

<script>
    const ADMIN_ID = 8421694319; // معرفكِ
    
    // محاكاة التحقق من الأدمن عند التحميل
    window.onload = () => {
        // لاحقاً سنربطه بـ tg.initDataUnsafe.user.id
        console.log("تم تحميل التطبيق");
    };

    function loadSection(type) {
        document.getElementById('modal').style.display = 'block';
        const content = document.getElementById('modalContent');
        
        // هنا المنطق البرمجي لجلب البيانات من Firebase
        content.innerHTML = `<h3>قسم ${type}</h3><p>محتوى ${type} الجذاب...</p>
        <button onclick="saveItem()">حفظ في ملفي الشخصي</button>`;
    }

    function openProfile() {
        alert("ملفكِ الشخصي: هنا ستظهر النصائح التي أعجبتكِ وقمتِ بحفظها.");
    }
    
    function saveItem() {
        alert("تم الحفظ في ملفك الشخصي بنجاح! 🌸");
    }
</script>
</body>
</html>
