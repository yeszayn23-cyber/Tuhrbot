<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Tuhr | طُهر</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --nude: #D4B499; --gold: #C5A059; --lavender: #E6E6FA; --bg: #FDFBF7; }
        body { background: var(--bg); font-family: 'Tajawal', sans-serif; margin: 0; padding: 0; display: flex; justify-content: center; min-height: 100vh; }

        /* حاوية العلبة الفاخرة */
        .case { width: 100%; max-width: 450px; background: #fff; padding: 40px 20px; box-shadow: 0 0 50px rgba(0,0,0,0.05); border-radius: 0 0 50px 50px; position: relative; }
        
        /* رأس الصفحة الفاخر */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .logo { font-family: 'Dancing Script', cursive; font-size: 3rem; color: var(--gold); }
        .profile-btn { width: 50px; height: 50px; border-radius: 50%; background: var(--lavender); display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid var(--gold); }

        /* شبكة المكياج (الدوائر) */
        .makeup-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .circle { 
            width: 140px; height: 140px; border-radius: 50%; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; color: white; font-weight: bold; 
            cursor: pointer; transition: 0.5s; box-shadow: 0 10px 20px rgba(0,0,0,0.1); 
            border: 6px solid #fff; outline: 2px solid var(--nude);
        }
        .circle:hover { transform: translateY(-10px) scale(1.05); box-shadow: 0 20px 30px rgba(197, 160, 89, 0.3); }

        /* قسم الملاحظات والجمال أسفل العلبة */
        .beauty-tips { margin-top: 50px; padding: 20px; background: var(--lavender); border-radius: 30px; font-size: 0.9rem; color: #4B0082; }
    </style>
</head>
<body>

<div class="case">
    <div class="header">
        <div class="profile-btn" onclick="openProfile()">🕊️</div>
        <div class="logo">طُهر</div>
        <div style="width: 50px;"></div>
    </div>

    <div class="makeup-grid">
        <div class="circle" style="background:#D2B48C" onclick="openGate('دورة')">💄<br>حساب الدورة</div>
        <div class="circle" style="background:#BC8F8F" onclick="openGate('مخطط')">💅<br>مخطط الدورة</div>
        <div class="circle" style="background:#C19A6B" onclick="openGate('نصائح')">✨<br>جمال وعناية</div>
        <div class="circle" style="background:#A0522D" onclick="openGate('فقه')">📖<br>الجانب الفقهي</div>
    </div>

    <div class="beauty-tips">
        <strong>🌸 نصيحة اليوم:</strong> اشربي الكثير من الماء الدافئ مع الليمون لتهدئة الجسم في هذه الفترة..
    </div>
</div>

<script>
    // نظام ذكي للتعرف على الأدمن (أنتِ)
    const MY_ID = 8421694319;
    function openGate(type) {
        alert("فتح بوابة " + type + " الاحترافية...");
    }
    function openProfile() {
        alert("🔒 جاري التحقق من الهوية.. فتح الملف الشخصي المحمي.");
    }
</script>

</body>
</html>
