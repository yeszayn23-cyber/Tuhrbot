<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>طهر Tuhr</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
    <style>
        body { background: #f3e5f5; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .glitter-text { color: #7b1fa2; font-size: 2em; animation: shine 2s infinite; text-shadow: 0 0 10px #e1bee7; }
        @keyframes shine { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
        .gate { height: 100vh; width: 100%; background: #9c27b0; transition: transform 1s; }
        .admin-panel { display: none; padding: 20px; background: white; border-radius: 15px; }
        .btn { background: #ba68c8; color: white; padding: 10px 20px; border: none; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="loader">
        <h1 class="glitter-text">طهر Tuhr</h1>
        <div id="jewel-key">💎 اضغط لفتح البوابة</div>
    </div>

    <div id="app" style="display:none;">
        <div id="content">
            <h3>مرحباً بكِ في طهر</h3>
            <button onclick="uploadBg()">تغيير الخلفية</button>
            <div id="admin-area" style="display:none;">
                <h4>لوحة تحكم الفقه</h4>
                <textarea id="fiqhText"></textarea>
                <button onclick="saveFiqh()">نشر المقال</button>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const ADMIN_ID = 8421694319;

        // تهيئة Firebase (أدخل بياناتك هنا)
        const firebaseConfig = { apiKey: "...", authDomain: "...", projectId: "..." };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // فحص الأدمن
        if(tg.initDataUnsafe.user.id == ADMIN_ID) {
            document.getElementById('admin-area').style.display = 'block';
        }

        function uploadBg() {
            // كود رفع الصورة وتخزينها في Firebase Storage
            alert("تم تفعيل ميزة اختيار الصورة");
        }
        
        // تابع لفتح البوابة (الانتقال بين الشاشات)
        document.getElementById('jewel-key').onclick = () => {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('app').style.display = 'block';
        };
    </script>
</body>
</html>
