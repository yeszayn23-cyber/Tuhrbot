<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تطبيق طهر - Tohr</title>
    <style>
        /* تصميم ألوان الخزامى والذهب */
        body { margin: 0; background-color: #E6E6FA; font-family: 'Arial', sans-serif; }
        #gate { position: fixed; width: 100%; height: 100vh; background: #D8BFD8; display: flex; z-index: 999; }
        .door { flex: 1; border: 5px solid #D4AF37; display: flex; align-items: center; justify-content: center; color: #4B0082; cursor: pointer; transition: 1s; }
        
        /* تصميم التطبيق */
        #app { display: none; padding: 20px; }
        .card { background: white; border-radius: 20px; padding: 20px; border: 2px solid #D4AF37; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="gate" onclick="this.style.display='none'; document.getElementById('app').style.display='block'">
        <div class="door"><h1>طهر</h1></div>
        <div class="door"><h1>✨</h1></div>
    </div>

    <div id="app">
        <div class="card">
            <h2>مرحباً بكِ في طهر</h2>
            <input type="password" id="pass" placeholder="أدخلي رمز القصر">
            <button onclick="checkAuth()">دخول</button>
        </div>
        
        <div id="content" style="display:none;">
            <div class="card">
                <h3>سجل الأعراض</h3>
                <textarea id="symp"></textarea>
                <button onclick="saveData()">حفظ البيانات</button>
            </div>
            </div>
    </div>

    <script>
        // هنا يتم ربط Firebase
        function checkAuth() { 
            // منطق التحقق من البصمة أو الرمز
            document.getElementById('content').style.display = 'block'; 
        }

        function saveData() {
            alert("تم حفظ البيانات في السحابة!");
        }
    </script>
</body>
</html>
